<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    box-shadow: horizontal vertical blur spread color;
    | অংশ        | কাজ                              |
| ---------- | -------------------------------- |
| horizontal | ডানে (+) বা বামে (-) ছায়া সরাবে |
| vertical   | নিচে (+) বা উপরে (-) ছায়া সরাবে |
| blur       | ছায়া কতটা ঝাপসা হবে             |
| spread     | ছায়া কতটা বড় হবে               |
| color      | ছায়ার রং                        |

</body>
</html>
